<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record - VoicePost</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="nav">
        <a href="index.html" class="logo">VoicePost</a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="how-it-works.html" class="nav-link">How It Works</a>
            <a href="pricing.html" class="nav-link">Pricing</a>
        </div>
    </nav>

    <!-- Recording Page -->
    <div class="main-content">
        <section class="recording-page">
            <div class="recording-container">
                <a href="index.html" class="back-link">&larr; Back to Home</a>
                
                <div id="idleState">
                    <button class="mic-button" id="micButton" onclick="startRecording()">
                        <svg class="mic-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path>
                        </svg>
                    </button>
                    <p class="recording-status">Click to start recording</p>
                    <p class="max-duration">Maximum duration: 2 minutes</p>
                    <p class="max-duration" style="margin-top: 8px; color: var(--linkedin-blue);">Using free Web Speech API</p>
                </div>

                <div id="recordingState">
                    <button class="mic-button recording" id="recordingMicButton" onclick="stopRecording()">
                        <svg class="mic-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path>
                        </svg>
                    </button>
                    <div class="recording-timer" id="recordingTimer">00:00</div>
                    <p class="recording-status" id="liveTranscript">Listening...</p>
                    <button class="cancel-btn" onclick="cancelRecording()">Cancel</button>
                </div>

                <div id="processingState">
                    <div class="spinner"></div>
                    <p class="recording-status">AI is thinking...</p>
                </div>

                <!-- Editor (Hidden by default) -->
                <div id="editorContainer" style="display: none;">
                    <div class="editor-container">
                        <h2>Your LinkedIn Post</h2>
                        <textarea class="post-textarea" id="postTextarea" placeholder="Your generated post will appear here..."></textarea>
                        <div class="editor-footer">
                            <div class="char-counter" id="charCounter">0 / 3000</div>
                            <label class="edit-toggle">
                                <input type="checkbox" id="editToggle" checked onchange="toggleEdit()">
                                Edit enabled
                            </label>
                        </div>
                        <div class="editor-actions" style="margin-top: 16px;">
                            <button class="btn btn-primary" onclick="copyToClipboard()">
                                <span id="copyText">Copy to Clipboard</span>
                                <span class="copied-feedback" id="copiedFeedback">Copied!</span>
                            </button>
                            <button class="btn btn-outline" onclick="generateAnother()">Generate Another</button>
                        </div>
                        <p class="error-message" id="errorMessage"></p>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-links">
                <a href="#">Terms</a>
                <a href="#">Privacy</a>
                <a href="#">Contact</a>
            </div>
            <p class="copyright">VoicePost. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // ============================================
        // FREE CONFIGURATION - Hugging Face API Key
        // Get free key at: https://huggingface.co/settings/tokens
        // ============================================
        const HUGGINGFACE_API_KEY = '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';
        // ============================================

        let recognition = null;
        let recordingTimer = null;
        let recordingSeconds = 0;
        let maxRecordingTime = 120;
        let finalTranscript = '';
        let isRecording = false;

        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            errorEl.textContent = message;
            errorEl.classList.add('show');
            setTimeout(() => {
                errorEl.classList.remove('show');
            }, 5000);
        }

        function startRecording() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (!SpeechRecognition) {
                showError('Speech recognition not supported. Please use Chrome or Edge.');
                return;
            }

            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            finalTranscript = '';
            isRecording = true;

            recognition.onstart = () => {
                document.getElementById('idleState').style.display = 'none';
                document.getElementById('recordingState').classList.add('active');
                document.getElementById('liveTranscript').textContent = 'Listening...';
                recordingSeconds = 0;

                recordingTimer = setInterval(() => {
                    recordingSeconds++;
                    const minutes = Math.floor(recordingSeconds / 60).toString().padStart(2, '0');
                    const seconds = (recordingSeconds % 60).toString().padStart(2, '0');
                    document.getElementById('recordingTimer').textContent = `${minutes}:${seconds}`;

                    if (recordingSeconds >= maxRecordingTime) {
                        stopRecording();
                    }
                }, 1000);
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i][0].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript + ' ';
                    } else {
                        interimTranscript += transcript;
                    }
                }
                document.getElementById('liveTranscript').textContent = interimTranscript || 'Listening...';
            };

            recognition.onerror = (event) => {
                console.error('Speech recognition error:', event.error);
                if (event.error === 'not-allowed') {
                    showError('Microphone access denied. Please allow microphone access.');
                } else if (event.error !== 'no-speech') {
                    showError('Error: ' + event.error);
                }
            };

            recognition.onend = () => {
                if (isRecording) {
                    // Restart if still recording
                    try {
                        recognition.start();
                    } catch (e) {
                        // Already stopped
                    }
                }
            };

            try {
                recognition.start();
            } catch (error) {
                console.error('Error starting recognition:', error);
                showError('Could not start recording. Please try again.');
            }
        }

        function stopRecording() {
            isRecording = false;
            
            if (recognition) {
                recognition.stop();
                recognition = null;
            }
            
            if (recordingTimer) {
                clearInterval(recordingTimer);
                recordingTimer = null;
            }

            if (finalTranscript.trim() === '') {
                showError('No speech detected. Please try again.');
                resetRecordingState();
                return;
            }

            processTranscript(finalTranscript.trim());
        }

        function cancelRecording() {
            isRecording = false;
            
            if (recognition) {
                recognition.stop();
                recognition = null;
            }
            
            if (recordingTimer) {
                clearInterval(recordingTimer);
                recordingTimer = null;
            }
            
            finalTranscript = '';
            resetRecordingState();
        }

        function resetRecordingState() {
            document.getElementById('idleState').style.display = 'block';
            document.getElementById('recordingState').classList.remove('active');
            document.getElementById('processingState').style.display = 'none';
            document.getElementById('editorContainer').style.display = 'none';
        }

        async function processTranscript(transcribedText) {
            document.getElementById('recordingState').classList.remove('active');
            document.getElementById('processingState').style.display = 'block';

            try {
                // Generate LinkedIn post using Hugging Face Inference API
                const response = await fetch('https://api-inference.huggingface.co/models/facebook/bart-large-cnn', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${HUGGINGFACE_API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        inputs: `Transform this voice memo into a polished, engaging LinkedIn post. Use a professional yet conversational tone. Add relevant hashtags. Keep it between 100-300 words. Never include emojis. Make it sound natural and authentic.\n\nVoice memo: ${transcribedText}`,
                        parameters: {
                            max_length: 500,
                            min_length: 100
                        }
                    })
                });

                if (!response.ok) {
                    throw new Error('Failed to generate post');
                }

                const data = await response.json();
                let generatedPost = '';

                if (Array.isArray(data) && data[0] && data[0].summary_text) {
                    generatedPost = data[0].summary_text;
                } else if (data.summary_text) {
                    generatedPost = data.summary_text;
                } else if (typeof data === 'string') {
                    generatedPost = data;
                } else {
                    // Fallback: use the transcribed text with some formatting
                    generatedPost = formatAsLinkedInPost(transcribedText);
                }

                if (!generatedPost || generatedPost.trim() === '') {
                    generatedPost = formatAsLinkedInPost(transcribedText);
                }

                // Show editor
                document.getElementById('processingState').style.display = 'none';
                document.getElementById('editorContainer').style.display = 'block';
                document.getElementById('postTextarea').value = generatedPost;
                updateCharCounter();

            } catch (error) {
                console.error('Error processing transcript:', error);
                // Fallback: format the transcript directly
                const formattedPost = formatAsLinkedInPost(transcribedText);
                document.getElementById('processingState').style.display = 'none';
                document.getElementById('editorContainer').style.display = 'block';
                document.getElementById('postTextarea').value = formattedPost;
                updateCharCounter();
            }
        }

        function formatAsLinkedInPost(text) {
            // Simple formatting if AI fails
            const sentences = text.split(/[.!?]+/).filter(s => s.trim());
            let post = '';
            
            if (sentences.length > 0) {
                post = sentences[0].trim() + '.';
                if (sentences.length > 1) {
                    post += '\n\n' + sentences.slice(1).join('. ').trim() + '.';
                }
                post += '\n\n#LinkedIn #Professional #Growth';
            } else {
                post = text + '\n\n#LinkedIn #Professional #Growth';
            }
            
            return post;
        }

        // Editor Functions
        function updateCharCounter() {
            const text = document.getElementById('postTextarea').value;
            const count = text.length;
            const counter = document.getElementById('charCounter');
            counter.textContent = `${count} / 3000`;
            
            if (count > 3000) {
                counter.classList.add('over');
            } else {
                counter.classList.remove('over');
            }
        }

        document.getElementById('postTextarea').addEventListener('input', updateCharCounter);

        function toggleEdit() {
            const enabled = document.getElementById('editToggle').checked;
            document.getElementById('postTextarea').disabled = !enabled;
        }

        function copyToClipboard() {
            const text = document.getElementById('postTextarea').value;
            navigator.clipboard.writeText(text).then(() => {
                document.getElementById('copyText').style.display = 'none';
                document.getElementById('copiedFeedback').classList.add('show');
                
                setTimeout(() => {
                    document.getElementById('copyText').style.display = 'inline';
                    document.getElementById('copiedFeedback').classList.remove('show');
                }, 2000);
            });
        }

        function generateAnother() {
            document.getElementById('editorContainer').style.display = 'none';
            document.getElementById('idleState').style.display = 'block';
            document.getElementById('postTextarea').value = '';
            updateCharCounter();
        }
    </script>
</body>
</html>
