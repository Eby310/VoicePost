<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record - VoicePost</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="nav">
        <a href="index.html" class="logo">VoicePost</a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="how-it-works.html" class="nav-link">How It Works</a>
            <a href="pricing.html" class="nav-link">Pricing</a>
        </div>
    </nav>

    <div class="main-content">
        <section class="recording-page">
            <a href="index.html" class="back-link">Back to Home</a>
            
            <div class="recording-container">
                <!-- Idle State -->
                <div id="idleState">
                    <button class="mic-button" id="micButton" onclick="startRecording()">
                        <svg class="mic-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path>
                        </svg>
                    </button>
                    <p class="recording-status">Click to start recording</p>
                    <p class="max-duration">Maximum duration: 2 minutes</p>
                    <p class="error-message" id="errorMessage"></p>
                </div>

                <!-- Recording State -->
                <div id="recordingState" style="display: none;">
                    <button class="mic-button recording" onclick="stopRecording()">
                        <svg class="mic-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path>
                        </svg>
                    </button>
                    <div class="recording-timer" id="recordingTimer">00:00</div>
                    <p class="recording-status" id="liveTranscript">Listening...</p>
                    <button class="cancel-btn" onclick="cancelRecording()">Cancel</button>
                </div>

                <!-- Processing State -->
                <div id="processingState" style="display: none;">
                    <div class="spinner"></div>
                    <p class="recording-status">Converting to LinkedIn post...</p>
                </div>

                <!-- Editor State -->
                <div id="editorState" style="display: none;">
                    <div class="editor-container">
                        <h2>Your LinkedIn Post</h2>
                        <textarea class="post-textarea" id="postTextarea"></textarea>
                        <div class="editor-footer">
                            <div class="char-counter" id="charCounter">0 / 3000</div>
                            <label class="edit-toggle">
                                <input type="checkbox" id="editToggle" checked onchange="toggleEdit()">
                                Edit enabled
                            </label>
                        </div>
                        <div class="editor-actions">
                            <button class="btn btn-primary" onclick="copyToClipboard()">
                                <span id="copyText">Copy to Clipboard</span>
                                <span class="copied-feedback" id="copiedFeedback">Copied!</span>
                            </button>
                            <button class="btn btn-outline" onclick="generateAnother()">Generate Another</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <footer class="footer">
        <div class="container">
            <div class="footer-links">
                <a href="#">Terms</a>
                <a href="#">Privacy</a>
                <a href="#">Contact</a>
            </div>
            <p class="copyright">VoicePost. All rights reserved.</p>
        </div>
    </footer>

    <script>
        // Speech Recognition
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        let timer = null;
        let seconds = 0;
        let transcript = '';
        let isRecording = false;

        function showError(msg) {
            const el = document.getElementById('errorMessage');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 5000);
        }

        function startRecording() {
            if (!SpeechRecognition) {
                showError('Speech recognition not supported. Use Chrome or Edge.');
                return;
            }

            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'en-US';

            transcript = '';
            isRecording = true;
            seconds = 0;

            recognition.onstart = function() {
                document.getElementById('idleState').style.display = 'none';
                document.getElementById('recordingState').style.display = 'block';
                document.getElementById('liveTranscript').textContent = 'Listening...';
                
                timer = setInterval(() => {
                    seconds++;
                    const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                    const s = (seconds % 60).toString().padStart(2, '0');
                    document.getElementById('recordingTimer').textContent = m + ':' + s;
                    
                    if (seconds >= 120) stopRecording();
                }, 1000);
            };

            recognition.onresult = function(event) {
                let interim = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        transcript += event.results[i][0].transcript + ' ';
                    } else {
                        interim += event.results[i][0].transcript;
                    }
                }
                document.getElementById('liveTranscript').textContent = interim || 'Listening...';
            };

            recognition.onerror = function(e) {
                console.log('Speech error:', e.error);
                if (e.error === 'not-allowed') {
                    showError('Microphone denied. Allow access and try again.');
                }
            };

            recognition.onend = function() {
                if (isRecording) {
                    try { recognition.start(); } catch(e) {}
                }
            };

            try {
                recognition.start();
            } catch(e) {
                showError('Could not start. Click again.');
            }
        }

        function stopRecording() {
            isRecording = false;
            if (recognition) {
                recognition.stop();
                recognition = null;
            }
            if (timer) {
                clearInterval(timer);
                timer = null;
            }

            if (!transcript.trim()) {
                showError('No speech detected. Try again.');
                resetToIdle();
                return;
            }

            processTranscript();
        }

        function cancelRecording() {
            isRecording = false;
            if (recognition) {
                recognition.stop();
                recognition = null;
            }
            if (timer) {
                clearInterval(timer);
                timer = null;
            }
            transcript = '';
            resetToIdle();
        }

        function resetToIdle() {
            document.getElementById('recordingState').style.display = 'none';
            document.getElementById('processingState').style.display = 'none';
            document.getElementById('editorState').style.display = 'none';
            document.getElementById('idleState').style.display = 'block';
        }

        function processTranscript() {
            document.getElementById('recordingState').style.display = 'none';
            document.getElementById('processingState').style.display = 'block';

            // Simulate processing delay
            setTimeout(() => {
                const linkedInPost = transformToLinkedInPost(transcript.trim());
                showEditor(linkedInPost);
            }, 1500);
        }

        function transformToLinkedInPost(text) {
            // Clean up the text
            let clean = text.replace(/\s+/g, ' ').trim();
            
            // Capitalize first letter
            clean = clean.charAt(0).toUpperCase() + clean.slice(1);
            
            // Add punctuation if missing
            if (!clean.endsWith('.') && !clean.endsWith('!') && !clean.endsWith('?')) {
                clean += '.';
            }

            // Split into sentences and create a LinkedIn post
            const sentences = clean.split(/[.!?]+/).filter(s => s.trim());
            
            let post = '';
            
            if (sentences.length > 0) {
                // Opening hook
                post += sentences[0].trim() + '.\n\n';
                
                // Body
                if (sentences.length > 1) {
                    post += sentences.slice(1).join('. ').trim() + '.\n\n';
                }
                
                // Closing call-to-action
                post += 'What are your thoughts? Share in the comments.\n\n';
                
                // Hashtags
                post += '#LinkedIn #ProfessionalGrowth #CareerDevelopment #Networking #Leadership';
            } else {
                post = clean + '\n\n#LinkedIn #ProfessionalGrowth';
            }

            return post;
        }

        function showEditor(post) {
            document.getElementById('processingState').style.display = 'none';
            document.getElementById('editorState').style.display = 'block';
            document.getElementById('postTextarea').value = post;
            updateCharCounter();
        }

        function updateCharCounter() {
            const count = document.getElementById('postTextarea').value.length;
            const counter = document.getElementById('charCounter');
            counter.textContent = count + ' / 3000';
            counter.classList.toggle('over', count > 3000);
        }

        document.getElementById('postTextarea').addEventListener('input', updateCharCounter);

        function toggleEdit() {
            document.getElementById('postTextarea').disabled = !document.getElementById('editToggle').checked;
        }

        function copyToClipboard() {
            const text = document.getElementById('postTextarea').value;
            navigator.clipboard.writeText(text).then(() => {
                document.getElementById('copyText').style.display = 'none';
                document.getElementById('copiedFeedback').classList.add('show');
                setTimeout(() => {
                    document.getElementById('copyText').style.display = 'inline';
                    document.getElementById('copiedFeedback').classList.remove('show');
                }, 2000);
            });
        }

        function generateAnother() {
            document.getElementById('editorState').style.display = 'none';
            document.getElementById('idleState').style.display = 'block';
            document.getElementById('postTextarea').value = '';
            updateCharCounter();
        }
    </script>
</body>
</html>
